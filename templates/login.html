<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t.auth_login_title }} — {{ t.app_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }

    .auth-header .brand {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.7);
      margin-bottom: .4rem;
    }

    .auth-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin: 0;
    }

    .auth-body { padding: 1.75rem 2rem 2rem; }

    .form-label { font-weight: 600; font-size: .88rem; color: #374151; }

    .form-control {
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: .95rem;
      border-color: #d1d5db;
    }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

    .btn-auth {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none;
      border-radius: 8px;
      padding: .7rem;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      transition: opacity .15s;
    }
    .btn-auth:hover { opacity: .9; color: #fff; }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .88rem;
      color: #6b7280;
    }
    .auth-footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .lang-switch {
      position: absolute;
      top: 1.25rem; right: 1.25rem;
      display: flex; gap: .4rem;
    }
  </style>
</head>
<body>

  <div class="lang-switch">
    <a href="/lang/bg" class="btn btn-sm {{ 'btn-light fw-bold' if lang == 'bg' else 'btn-outline-secondary' }} text-nowrap">BG</a>
    <a href="/lang/en" class="btn btn-sm {{ 'btn-light fw-bold' if lang == 'en' else 'btn-outline-secondary' }} text-nowrap">EN</a>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">{{ t.app_name }}</div>
      <h1>{{ t.auth_login_title }}</h1>
    </div>

    <div class="auth-body">
      {% if error %}
      <div class="alert alert-danger py-2 mb-3" role="alert" style="font-size:.88rem">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">{{ t.auth_username_label }}</label>
          <input id="username" type="text" name="username" class="form-control"
                 placeholder="{{ t.auth_username_placeholder }}"
                 value="{{ username or '' }}" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">{{ t.auth_password_label }}</label>
          <input id="password" type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-auth">{{ t.auth_login_btn }}</button>
      </form>

      <div class="auth-footer">
        {{ t.auth_no_account }}
        <a href="/register">{{ t.auth_go_register }}</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
