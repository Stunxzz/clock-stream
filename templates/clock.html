<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ location.name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #dc2626;
      transition: background-color 0.7s ease;
      font-family: 'Courier New', Courier, monospace;
      position: relative;
    }

    /* Color states */
    body.red    { background-color: #dc2626; }
    body.yellow { background-color: #d97706; }
    body.green  { background-color: #16a34a; }

    /* Main time display */
    #time {
      font-size: clamp(120px, 28vw, 520px);
      font-weight: 900;
      color: rgba(255, 255, 255, 0.97);
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
      text-shadow:
        0 6px 30px rgba(0, 0, 0, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.12);
    }

    /* Location name — subtle, bottom-left */
    #location-label {
      position: absolute;
      bottom: 2rem;
      left: 2.5rem;
      color: rgba(255, 255, 255, 0.55);
      font-family: system-ui, sans-serif;
      font-size: clamp(14px, 1.4vw, 28px);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      user-select: none;
    }

    /* Status indicator — bottom-right */
    #status {
      position: absolute;
      bottom: 2rem;
      right: 2.5rem;
      color: rgba(255, 255, 255, 0.55);
      font-family: system-ui, sans-serif;
      font-size: clamp(13px, 1.2vw, 24px);
      font-weight: 500;
      user-select: none;
      transition: opacity .4s;
    }

    /* Connection lost overlay */
    #reconnect {
      display: none;
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.8);
      font-family: system-ui, sans-serif;
      font-size: clamp(12px, 1vw, 18px);
      padding: .4rem 1rem;
      border-radius: 20px;
    }
  </style>
</head>
<body class="red">

  <div id="time">--:--</div>
  <div id="reconnect">{{ t.clock_reconnecting }}</div>

  <script>
    const timeEl   = document.getElementById('time');
    const reconnEl = document.getElementById('reconnect');


    let src;

    function connect() {
      src = new EventSource('/stream/{{ location.id }}');

      src.onopen = () => { reconnEl.style.display = 'none'; };

      src.onmessage = function (e) {
        const { time, color } = JSON.parse(e.data);
        timeEl.textContent      = time;
        document.body.className = color;
      };

      src.onerror = function () {
        src.close();
        reconnEl.style.display = 'block';
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
